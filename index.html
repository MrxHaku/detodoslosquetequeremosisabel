<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 Primaveras - Bel</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema: #fdfcf0; --miel: #b08968;
            --v1: #E91E63; --v2: #FFEB3B; --v3: #2196F3; --v4: #4CAF50; --v5: #FF5722;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--crema); 
            font-family: 'Special Elite', serif; height: 100vh; overflow-x: hidden;
        }

        .grid-bg {
            background-color: var(--crema);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- LANDING --- */
        #landing {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            padding: 40px 20px; transition: opacity 1s;
        }
        #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .char {
            display: inline-block; font-family: 'Bungee', cursive;
            font-size: clamp(1.4rem, 5vw, 3.5rem); 
            padding: 10px 15px; box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            transform: rotate(var(--r)); margin: 3px; border-radius: 0px !important; 
        }
        .v1 { background: var(--v1); color: white; }
        .v2 { background: var(--v2); color: #333; }
        .v3 { background: var(--v3); color: white; }
        .v4 { background: var(--v4); color: white; }
        .v5 { background: var(--v5); color: white; }

        /* FIX 1: Título centrado */
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .line {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .polaroid-landing {
            position: absolute; background: white; padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #ddd;
            width: 210px; z-index: 2;
            animation: swayPolaroid var(--sway-dur, 5s) ease-in-out infinite alternate;
            transform-origin: top center;
        }
        .polaroid-landing:hover {
            animation-play-state: paused;
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 50;
        }
        @keyframes swayPolaroid {
            0%   { transform: rotate(var(--r)) translateY(0px); }
            50%  { transform: rotate(calc(var(--r) + 3deg)) translateY(-8px); }
            100% { transform: rotate(calc(var(--r) - 3deg)) translateY(-4px); }
        }
        .polaroid-landing img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .floating-emoji { 
            position: absolute; font-size: 3.5rem; z-index: 5; 
            animation: floatEmoji 5s ease-in-out infinite alternate;
        }
        @keyframes floatEmoji {
            from { transform: translate(0, 0) rotate(-10deg); }
            to { transform: translate(15px, -20px) rotate(10deg); }
        }

        /* FIX 2: Tocadiscos mejorado */
        .vinyl-disk {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid #000;
            background: 
                radial-gradient(circle at 50% 50%, #fff 0%, #fff 11%, transparent 12%),
                repeating-radial-gradient(circle at 50% 50%, #111 0px, #111 2px, #222 2px, #222 4px, #111 4px, #111 6px, #333 6px, #333 8px);
            position: relative; animation: spin 2.5s linear infinite; animation-play-state: paused;
            box-shadow: 0 0 0 2px #333, inset 0 0 8px rgba(0,0,0,0.5);
        }
        .vinyl-disk::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; background: #fff;
            border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #000;
            z-index: 2;
        }
        .vinyl-disk::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px; border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Sobre con carta que asoma - FIX 3 */
        .envelope { 
            width: 150px; height: 105px; background: #f3d5b5; position: relative; 
            cursor: pointer; transition: transform 0.3s ease; perspective: 800px;
            overflow: visible;
        }
        .envelope:hover { transform: scale(1.1) rotate(2deg); }

        /* Carta de papel que asoma */
        .envelope .carta-interior {
            position: absolute;
            bottom: 0; left: 10%; width: 80%;
            height: 55px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 2px 2px 0 0;
            z-index: 1;
            transform: translateY(0px);
            transition: transform 0.5s ease 0.2s, opacity 0.4s ease 0.2s;
            opacity: 0;
            /* Líneas de carta */
            background-image: repeating-linear-gradient(
                transparent, transparent 10px, #e8e8e8 10px, #e8e8e8 11px
            );
            background-position: 0 12px;
        }
        .envelope:hover .carta-interior {
            transform: translateY(-28px);
            opacity: 1;
        }

        /* Solapa del sobre */
        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0; z-index: 3;
            border-top: 55px solid #e6ccb2;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            transform-origin: top;
            transition: transform 0.45s ease;
        }
        .envelope:hover::after { transform: rotateX(160deg); }
        
        .env-body { 
            position: absolute; inset: 0; z-index: 2; background: #f3d5b5; 
            display: flex; justify-content: center; align-items: center; 
        }
        .env-number { font-family: 'Bungee'; color: #7f5539; font-size: 1.5rem; }

        .modal-container { 
            display: flex; flex-wrap: nowrap; background: var(--crema); 
            width: 95vw; max-width: 1100px; height: 600px; 
            margin: 40px auto; border: 3px solid #333; overflow: hidden; 
        }
        .text-side { flex: 1; padding: 40px; border-right: 2px dashed #ccc; display: flex; flex-direction: column; }
        .scroll-area {
            flex-grow: 1; overflow-y: auto; padding: 20px 10px;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        /* FIX 4: Flores flotantes en el fondo de los sobres */
        .flower-bg {
            position: fixed; font-size: 2rem; pointer-events: none; z-index: 0;
            animation: floatFlower 10s ease-in-out infinite alternate;
            opacity: 0.35;
        }
        @keyframes floatFlower {
            0%   { transform: translate(0, 0) rotate(-8deg) scale(1); }
            25%  { transform: translate(8px, -12px) rotate(4deg) scale(1.05); }
            50%  { transform: translate(-6px, -20px) rotate(-4deg) scale(0.97); }
            75%  { transform: translate(12px, -8px) rotate(8deg) scale(1.03); }
            100% { transform: translate(-10px, -25px) rotate(-6deg) scale(1); }
        }

        /* Reproductor */
        .music-player { 
            position: fixed; bottom: 20px; left: 20px; display: flex; align-items: center; 
            gap: 12px; background: #fff; padding: 10px 18px; border-radius: 50px; 
            border: 3px solid #333; box-shadow: 6px 6px 0px #333; z-index: 2000; 
        }
        .player-controls { display: flex; align-items: center; gap: 6px; }
        .player-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; }
        .player-btn svg { fill: #333; }
        .player-btn:hover svg { fill: #E91E63; }

        #main-content { display: none; padding: 130px 20px 80px; flex-direction: column; align-items: center; position: relative; }
        .envelopes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; max-width: 1200px; position: relative; z-index: 1; }
        .custom-btn { padding: 15px 35px; cursor: pointer; font-family: 'Bungee'; border: 3px solid #333; background: #fff; box-shadow: 5px 5px 0px #333; transition: 0.2s; }
        .custom-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #333; }
        .header-nav { position: fixed; top: 0; width: 100%; height: 90px; background: linear-gradient(var(--crema) 75%, transparent); display: flex; justify-content: center; align-items: center; z-index: 500; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 3000; padding: 20px; }
        .photo-side { width: 450px; padding: 30px; background: #fff; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; overflow-y: auto; }
        #video-overlay { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }

        #flower-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--crema);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loader-heart {
            font-size: 3rem;
            animation: heartbeat 1.2s infinite;
        }

        .loader-text {
            font-family: 'Dancing Script';
            font-size: 1.5rem;
            color: #b08968;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

    </style>
</head>
<body class="grid-bg">
    <div id="loader">
        <div class="loader-content">
            <div class="loader-heart">💖</div>
            <p class="loader-text">Cargando algo especial...</p>
        </div>
    </div>


    <!-- FIX 2: Reproductor con prev/next -->
    <div class="music-player" id="player" style="display:none;">
        <div class="vinyl-disk" id="vinyl"></div>
        <div class="player-controls">
            <button class="player-btn" onclick="prevTrack()" title="Anterior">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="player-btn" onclick="togglePlay()">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="player-btn" onclick="nextTrack()" title="Siguiente">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.89L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
            </button>
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
            <span id="track-name" style="font-size:0.8rem; font-weight:bold; max-width:130px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Corazón</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" style="width:90px;">
        </div>
        <audio id="bg-music" src="music/cancion1.mp3"></audio>
    </div>

    <div id="landing" class="grid-bg">
        <div class="polaroid-landing" style="top:5%; left:4%; --r:-8deg; --sway-dur:4.5s;"><img src="img/isa1.png"></div>
        <div class="polaroid-landing" style="top:58%; right:10%; --r:10deg; --sway-dur:6s;"><img src="img/isa2.png"></div>
        <div class="polaroid-landing" style="bottom:8%; left:15%; --r:6deg; --sway-dur:5.2s;"><img src="img/isa3.png"></div>
        <div class="polaroid-landing" style="bottom:64%; right:4%; --r:5deg; --sway-dur:4.8s;"><img src="img/isa8.png"></div>

        <span class="floating-emoji" style="top:8%; right:32%;">✈️</span>
        <span class="floating-emoji" style="top:55%; left:38%;">🗼</span>
        <span class="floating-emoji" style="top:54%; right:32%;">🎬</span>
        <span class="floating-emoji" style="top:70%; left:8%;">🎨</span>
        <span class="floating-emoji" style="bottom:6%; right:28%;">🌻</span>
        <span class="floating-emoji" style="top:12%; left:45%;">🎓</span>
        <span class="floating-emoji" style="top:10%; left:30%;">📸</span>
        <span class="floating-emoji" style="bottom:12%; left:38%;">🤳</span>
        <span class="floating-emoji" style="bottom:22%; right:4%;">💖</span>

        <!-- FIX 1: Título centrado con contenedor flex -->
        <div class="title-container">
            <div class="line" id="line1"></div>
            <div class="line" id="line2"></div>
        </div>
        <button class="custom-btn" style="font-size:1.8rem;" onclick="start()">ABRIR</button>
    </div>

    <div class="header-nav" id="header-nav" style="display:none;">
        <button class="custom-btn" style="position:absolute; left:20px; padding:10px 20px; font-size:0.8rem;" onclick="location.reload()">← VOLVER</button>
        <h1 style="font-family:'Dancing Script'; color:#d62828; margin:0; font-size:2.4rem;">Happy Birthday, Isa</h1>
    </div>

    <div id="main-content" class="grid-bg">
        <div id="flower-container"></div>
        <div class="envelopes-grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal-container">
            <div class="text-side">
                <div id="friend-name-container" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
                <div class="scroll-area">
                    <p id="letter-text" style="font-size:1.3rem; line-height:1.7; color:#444;"></p>
                </div>
                <button class="custom-btn" style="width:100%; margin-top:20px;" onclick="closeModal()">CERRAR CARTA</button>
            </div>
            <div class="photo-side" id="photo-container"></div>
        </div>
    </div>

    <div id="video-overlay">
        <video id="video-final" style="width:85%; border:8px solid #fff;"><source src="video_cumple.mov" type="video/quicktime"></video>
        <button class="custom-btn" style="margin-top:20px;" onclick="location.reload()">FINALIZAR</button>
    </div>

    <script>
        const cartasData = [
            { 
                nombre: "Mamá", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Papá", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Daniel", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Anita", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Cata", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Paulis", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Emaoso", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras. Le doy gracias a Dios por haberme permitido conocerte, llegar a tu vida o creo que fuiste tú quien llegó a la mia. Eres unica y muy valiosa, loca y consentida, este año que vivi junto a ti me enseñaste muchas cosas, me hiciste reir, llorar, me diste tu apoyo incondicional y me hiciste sentir muy especial. Espero que este año que viene sea el mejor de todos, que se cumplan tus sueños y que sigas siendo esa persona maravillosa que eres. Te quiero mucho y siempre estaré aquí para ti.\n\nCon mucho amor, Emaoso.", 
                fotos: ["img/emaoso.png", "img/isa4.png"] 
            },
        ];

        const playlist = [
            { src: "music/cancion1.mp3", titulo: "Aprender a Quererte" },
            { src: "music/cancion2.mp3", titulo: "Corazón" },
            { src: "music/cancion3.mp3", titulo: "Mi Nuevo Vicio" },
            { src: "music/cancion4.mp3", titulo: "Una Canción de Amor para Isa" },
            { src: "music/cancion5.mp3", titulo: "Turning Page"},
            { src: "music/cancion6.mp3", titulo: "Learn to Love Again"},
            { src: "music/cancion7.mp3", titulo: "Yellow"},
        ];

        const audio = document.getElementById('bg-music');
        const vinyl = document.getElementById('vinyl');
        let currentTrack = 0;
        let readSet = new Set();

        function loadTrack(index) {
            currentTrack = (index + playlist.length) % playlist.length;
            const track = playlist[currentTrack];
            audio.src = track.src;
            document.getElementById('track-name').textContent = track.titulo;
        }

        function prevTrack() {
            loadTrack(currentTrack - 1);
            audio.play(); ui(true);
        }

        function nextTrack() {
            loadTrack(currentTrack + 1);
            audio.play(); ui(true);
        }

        audio.addEventListener('ended', () => nextTrack());

        function togglePlay() { 
            if (audio.paused) { audio.play(); ui(true); } 
            else { audio.pause(); ui(false); } 
        }

        function ui(playing) { 
            document.getElementById('play-icon').style.display = playing ? 'none' : 'block'; 
            document.getElementById('pause-icon').style.display = playing ? 'block' : 'none'; 
            vinyl.style.animationPlayState = playing ? 'running' : 'paused'; 
        }

        function start() { 
            document.getElementById('landing').classList.add('hidden'); 
            document.getElementById('main-content').style.display = 'flex'; 
            document.getElementById('header-nav').style.display = 'flex'; 
            document.getElementById('player').style.display = 'flex'; 
            loadTrack(0);
            togglePlay(); 
            createFlowers(); 
        }

        function buildLetters(text, containerId) {
            const container = document.getElementById(containerId); 
            container.innerHTML = '';
            text.split(' ').forEach((word, wi, arr) => {
                const wordDiv = document.createElement('div'); 
                wordDiv.style.cssText = 'display:flex; flex-shrink:0;';
                word.split('').forEach(char => {
                    const s = document.createElement('span'); 
                    s.className = `char v${Math.floor(Math.random()*5)+1}`;
                    s.innerText = char; 
                    s.style.setProperty('--r', `${Math.random()*8-4}deg`);
                    wordDiv.appendChild(s);
                });
                container.appendChild(wordDiv);
                // Espacio entre palabras (excepto después de la última)
                if (wi < arr.length - 1) {
                    const space = document.createElement('div');
                    space.style.cssText = 'width:16px; flex-shrink:0;';
                    container.appendChild(space);
                }
            });
        }
        buildLetters("de todos los que", 'line1'); 
        buildLetters("te queremos, Bel", 'line2');

        const grid = document.getElementById('grid');
        for(let i = 0; i < 28; i++) {
            const env = document.createElement('div'); 
            env.className = 'envelope';
            // FIX 3: carta interior como elemento hijo
            env.innerHTML = `
                <div class="carta-interior"></div>
                <div class="env-body"><div class="env-number">${i + 1}</div></div>
            `;
            env.onclick = () => openLetter(i); 
            grid.appendChild(env);
        }

        function openLetter(i) {
            const data = cartasData[i] || { 
                nombre: `Amigo ${i+1}`, 
                texto: "¡Feliz cumpleaños, Bel! 🎉", 
                fotos: [] 
            };
            buildLetters(data.nombre, 'friend-name-container');
            document.getElementById('letter-text').innerText = data.texto;
            const pCont = document.getElementById('photo-container'); 
            pCont.innerHTML = '';
            data.fotos.forEach(url => {
                const pol = document.createElement('div'); 
                pol.className = 'polaroid';
                pol.style.cssText = `transform: rotate(${Math.random()*10-5}deg); background:#fff; padding:10px 10px 30px; box-shadow:0 5px 15px rgba(0,0,0,0.2);`;
                pol.innerHTML = `<img src="${url}" style="width:180px; height:180px; object-fit:cover;">`; 
                pCont.appendChild(pol);
            });
            document.getElementById('overlay').style.display = 'block';
            document.querySelectorAll('.envelope')[i].style.filter = 'grayscale(1)';
            readSet.add(i);
        }

        function closeModal() { 
            document.getElementById('overlay').style.display = 'none'; 
            if(readSet.size === 28) {
                const videoOverlay = document.getElementById('video-overlay');
                const videoFinal = document.getElementById('video-final');
                if (!audio.paused) {
                    audio.pause();
                    ui(false);
                }
                videoOverlay.style.display = 'flex';
                videoFinal.play();
            } 
        }

        // FIX 4: Flores flotantes suaves, no caen — se mecen
        function createFlowers() {
            const container = document.getElementById('flower-container');
            const icons = ['🌻', '🌸', '✨', '💖', '🌼', '🌺'];
            const positions = [
                {top:'5%', left:'3%'}, {top:'12%', left:'18%'}, {top:'8%', left:'35%'},
                {top:'15%', left:'55%'}, {top:'6%', left:'72%'}, {top:'18%', left:'88%'},
                {top:'30%', left:'8%'}, {top:'35%', left:'25%'}, {top:'28%', left:'45%'},
                {top:'32%', left:'65%'}, {top:'25%', left:'82%'}, {top:'45%', left:'5%'},
                {top:'50%', left:'30%'}, {top:'42%', left:'50%'}, {top:'48%', left:'70%'},
                {top:'55%', left:'88%'}, {top:'62%', left:'12%'}, {top:'65%', left:'40%'},
                {top:'70%', left:'60%'}, {top:'60%', left:'78%'},
            ];

            positions.forEach((pos, i) => {
                const f = document.createElement('div'); 
                f.className = 'flower-bg';
                f.innerText = icons[i % icons.length];
                f.style.top = pos.top;
                f.style.left = pos.left;
                f.style.fontSize = `${1.5 + Math.random() * 1.5}rem`;
                f.style.animationDelay = `${Math.random() * 6}s`;
                f.style.animationDuration = `${7 + Math.random() * 5}s`;
                container.appendChild(f);
            });
        }

        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;

                window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1800); // duración del loader
        });
            </script>
</body>
</html>
