<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 Primaveras - Bel</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema: #fdfcf0; --miel: #b08968;
            /* Paleta Vivas para Título */
            --v1: #E91E63; --v2: #FFEB3B; --v3: #2196F3; --v4: #4CAF50; --v5: #FF5722;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: #f8f9f1; 
            font-family: 'Special Elite', serif; overflow-x: hidden;
        }

        /* --- LANDING PAGE --- */
        #landing {
            background-color: var(--crema);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s; padding: 40px 20px;
        }
        #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Título Principal */
        .title-container { text-align: center; z-index: 10; pointer-events: none; }
        .line { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        
        /* Estilos de las letras individuales */
        .char {
            display: inline-block; font-family: 'Bungee', cursive;
            font-size: clamp(1.8rem, 6vw, 3.8rem); padding: 8px 12px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            transform: rotate(var(--r)); margin: 4px;
        }
        /* Definición de colores para las letras */
        .v1 { background: var(--v1); color: white; }
        .v2 { background: var(--v2); color: #333; }
        .v3 { background: var(--v3); color: white; }
        .v4 { background: var(--v4); color: white; }
        .v5 { background: var(--v5); color: white; }

        /* --- EMOJIS FLOTANTES --- */
        .floating-emoji {
            position: absolute; font-size: clamp(3rem, 8vw, 6rem);
            user-select: none; z-index: 5;
            animation: float-around var(--d) ease-in-out infinite alternate;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        @keyframes float-around {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--rot)); }
        }

        /* --- BOTÓN ENTRAR --- */
        .btn-start {
            margin-top: 40px; padding: 18px 50px; cursor: pointer;
            font-family: 'Dancing Script'; font-size: 2.2rem;
            border-radius: 50px; border: 3px solid #333; background: #fff;
            box-shadow: 6px 6px 0px #333; transition: 0.2s; z-index: 20;
        }
        .btn-start:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0px #333; }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content { 
            display: none; padding: 140px 20px 80px; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        
        .header-nav {
            position: fixed; top: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, #f8f9f1 80%, transparent);
            display: flex; justify-content: center; align-items: center;
            z-index: 500; padding: 0 20px;
        }
        .header-nav h1 { font-family: 'Dancing Script'; color: #d62828; margin: 0; font-size: clamp(1.8rem, 5vw, 2.8rem); }

        /* Flecha de Regreso con estilo "Papel" */
        .back-arrow {
            position: absolute; left: 30px; cursor: pointer;
            font-size: 1.8rem; background: #fff; border: 2px solid #333;
            padding: 5px 15px; box-shadow: 4px 4px 0px #333;
            font-family: 'Bungee', cursive; transition: 0.2s;
        }
        .back-arrow:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #333; }

        /* Grid y Sobres */
        .envelopes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 40px; width: 100%; max-width: 1100px; }
        .envelope { width: 160px; height: 110px; background: #f3d5b5; position: relative; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 4px; }
        .envelope:hover { transform: scale(1.1) rotate(2deg); z-index: 10; }
        .envelope.read { filter: grayscale(1); opacity: 0.3; }
        .envelope::after { content: ''; position: absolute; top: 0; left: 0; border-top: 55px solid #e6ccb2; border-left: 80px solid transparent; border-right: 80px solid transparent; }
        .env-number { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; color: #7f5539; z-index: 10; }

        /* Modales */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-container { display: flex; flex-wrap: wrap; background: #fdfcf0; max-width: 1100px; margin: 20px auto; border-radius: 8px; overflow: hidden; }
        .text-side, .photo-side { flex: 1 1 50%; min-width: 300px; padding: 40px; }
        .text-side { border-right: 1px dashed #d6ccc2; display: flex; flex-direction: column; }
        .photo-side { background: #fcfcfc; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .polaroid-carta { background: white; padding: 12px 12px 35px 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); transform: rotate(var(--r)); width: 240px; border: 1px solid #eee; }
        .polaroid-carta img { width: 100%; height: 200px; object-fit: cover; }
        .btn-close { margin-top: auto; padding: 15px; cursor: pointer; border: 1px solid var(--miel); background: white; font-family: inherit; color: var(--miel); transition: 0.3s; }
        
        #video-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; z-index: 5000; justify-content: center; align-items: center; }
        .vhs-box { width: 95%; max-width: 800px; position: relative; border: 12px solid #1a1a1a; }
        
        @media (max-width: 800px) { .text-side { border-right: none; border-bottom: 1px dashed #d6ccc2; } }
    </style>
</head>
<body>

    <div id="landing">
        <span class="floating-emoji" style="top:15%; left:10%; --x:20px; --y:40px; --rot:15deg; --d:4s;">🎓</span>
        <span class="floating-emoji" style="top:20%; right:15%; --x:-30px; --y:50px; --rot:-20deg; --d:5s;">🎤</span>
        <span class="floating-emoji" style="bottom:25%; left:15%; --x:40px; --y:-30px; --rot:10deg; --d:6s;">📸</span>
        <span class="floating-emoji" style="bottom:15%; right:10%; --x:-20px; --y:-50px; --rot:25deg; --d:4.5s;">🗼</span>
        <span class="floating-emoji" style="top:50%; left:5%; --x:30px; --y:20px; --rot:-10deg; --d:7s;">🎶</span>
        <span class="floating-emoji" style="top:60%; right:5%; --x:-40px; --y:-20px; --rot:15deg; --d:5.5s;">✈️</span>

        <div class="title-container">
            <div class="line" id="line1"></div>
            <div class="line" id="line2"></div>
        </div>
        <button class="btn-start" onclick="start()">Entrar</button>
    </div>

    <div class="header-nav" id="header-nav" style="display:none;">
        <button class="back-arrow" onclick="location.reload()">← VOLVER</button>
        <h1>Happy Birthday, Isa</h1>
    </div>

    <div id="main-content">
        <div class="envelopes-grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal-container">
            <div class="text-side">
                <div id="friend-name-container" class="friend-name" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
                <hr style="margin:25px 0; border:none; border-top:1px dashed #ccc;">
                <p id="letter-text" style="line-height:1.8; color:#444; font-size:1.1rem; white-space:pre-line;"></p>
                <button class="btn-close" onclick="closeModal()">CERRAR CARTA</button>
            </div>
            <div class="photo-side" id="photo-container"></div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="vhs-box">
            <video id="video-final" width="100%"><source src="video_cumple.mov" type="video/quicktime"></video>
            <button onclick="document.getElementById('video-overlay').style.display='none'" style="width:100%; padding:15px; background:#e63946; color:white; border:none; cursor:pointer;">CERRAR VIDEO</button>
        </div>
    </div>

    <script>
        // Título Principal
        const text1 = "de todos los que";
        const text2 = "te queremos Bel";
        
        function buildTitle(text, elementId) {
            const container = document.getElementById(elementId);
            text.split(' ').forEach(word => {
                const wordDiv = document.createElement('div');
                wordDiv.style.display = 'flex';
                word.split('').forEach(char => {
                    const span = document.createElement('span');
                    // Asigna clases v1 a v5 de forma cíclica para asegurar colores
                    const colorIndex = Math.floor(Math.random() * 5) + 1;
                    span.className = `char v${colorIndex}`;
                    span.innerText = char;
                    span.style.setProperty('--r', `${Math.random() * 8 - 4}deg`);
                    wordDiv.appendChild(span);
                });
                container.appendChild(wordDiv);
                const space = document.createElement('div');
                space.style.width = '15px';
                container.appendChild(space);
            });
        }
        buildTitle(text1, 'line1');
        buildTitle(text2, 'line2');

        // Datos Cartas
        const cartasData = [
            { nombre: "Emaoso", texto: "Hola Isa...", fotos: ["img/bel1.jpg"] }
        ];

        // Inicializar Sobres
        const grid = document.getElementById('grid');
        let readCount = new Set();
        for(let i=0; i<28; i++) {
            const num = (i+1).toString().padStart(2, '0');
            const env = document.createElement('div');
            env.className = 'envelope';
            env.innerHTML = `<div class="env-number">${num}</div>`;
            env.onclick = () => openLetter(i);
            grid.appendChild(env);
        }

        function start() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('header-nav').style.display = 'flex';
        }

        function openLetter(index) {
            const data = cartasData[index] || {nombre: "Amigo", texto: "Pronto...", fotos: []};
            const nameContainer = document.getElementById("friend-name-container");
            nameContainer.innerHTML = '';
            data.nombre.split('').forEach(char => {
                const s = document.createElement('span');
                s.className = `char v${Math.floor(Math.random()*5)+1}`;
                s.style.fontSize = '1.5rem';
                s.innerText = char;
                nameContainer.appendChild(s);
            });
            document.getElementById('letter-text').innerText = data.texto;
            const pContainer = document.getElementById('photo-container');
            pContainer.innerHTML = '';
            data.fotos.forEach(src => {
                const p = document.createElement('div');
                p.className = 'polaroid-carta';
                p.style.setProperty('--r', `${Math.random()*10-5}deg`);
                p.innerHTML = `<img src="${src}"><p style="text-align:center; font-family:'Dancing Script'; margin-top:10px;">Bel & ${data.nombre}</p>`;
                pContainer.appendChild(p);
            });
            document.getElementById('overlay').style.display = 'block';
            readCount.add(index);
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            if(readCount.size === 28) {
                document.getElementById('video-overlay').style.display = 'flex';
                document.getElementById('video-final').play();
            }
        }
    </script>
</body>
</html>
