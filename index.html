<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 Primaveras - Bel</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤍</text></svg>">
    <style>
        :root {
            --crema: #fdfcf0; --miel: #b08968;
            --v1: #E91E63; --v2: #FFEB3B; --v3: #2196F3; --v4: #4CAF50; --v5: #FF5722;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--crema); 
            font-family: 'Special Elite', serif; height: 100vh; overflow-x: hidden;
        }

        .grid-bg {
            background-color: var(--crema);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- LANDING --- */
        #landing {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            padding: 40px 20px; transition: opacity 1s;
        }
        #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .char {
            display: inline-block; font-family: 'Bungee', cursive;
            font-size: clamp(1.4rem, 5vw, 3.5rem); 
            padding: 10px 15px; box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            transform: rotate(var(--r)); margin: 3px; border-radius: 0px !important; 
        }
        .v1 { background: var(--v1); color: white; }
        .v2 { background: var(--v2); color: #333; }
        .v3 { background: var(--v3); color: white; }
        .v4 { background: var(--v4); color: white; }
        .v5 { background: var(--v5); color: white; }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .line {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .polaroid-landing {
            position: absolute; background: white; padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #ddd;
            width: 210px; z-index: 2;
            animation: swayPolaroid var(--sway-dur, 5s) ease-in-out infinite alternate;
            transform-origin: top center;
        }
        .polaroid-landing:hover {
            animation-play-state: paused;
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 50;
        }
        @keyframes swayPolaroid {
            0%   { transform: rotate(var(--r)) translateY(0px); }
            50%  { transform: rotate(calc(var(--r) + 3deg)) translateY(-8px); }
            100% { transform: rotate(calc(var(--r) - 3deg)) translateY(-4px); }
        }
        .polaroid-landing img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .floating-emoji { 
            position: absolute; font-size: 3.5rem; z-index: 5; 
            animation: floatEmoji 5s ease-in-out infinite alternate;
        }
        @keyframes floatEmoji {
            from { transform: translate(0, 0) rotate(-10deg); }
            to { transform: translate(15px, -20px) rotate(10deg); }
        }

        /* --- REPRODUCTOR --- */
        .music-player { 
            position: fixed; bottom: 20px; left: 20px; display: flex; align-items: center; 
            gap: 12px; background: #fff; padding: 10px 18px; border-radius: 50px; 
            border: 3px solid #333; box-shadow: 6px 6px 0px #333; z-index: 2000; 
        }

        .vinyl-disk {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid #000;
            background: 
                radial-gradient(circle at 50% 50%, #fff 0%, #fff 11%, transparent 12%),
                repeating-radial-gradient(circle at 50% 50%, #111 0px, #111 2px, #222 2px, #222 4px, #111 4px, #111 6px, #333 6px, #333 8px);
            position: relative; animation: spin 2.5s linear infinite; animation-play-state: paused;
            box-shadow: 0 0 0 2px #333, inset 0 0 8px rgba(0,0,0,0.5);
        }
        .vinyl-disk::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; background: #fff;
            border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #000;
            z-index: 2;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- NUEVO: PLAYLIST MENU --- */
        .playlist-wrapper { position: relative; }
        .playlist-menu {
            position: absolute; bottom: 80px; left: 0; width: 250px;
            max-height: 250px; overflow-y: auto; background: white;
            border: 3px solid #333; border-radius: 15px; box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            display: none; flex-direction: column; z-index: 2001;
            padding: 10px;
        }
        .playlist-menu.active { display: flex; }
        .playlist-item {
            padding: 8px 12px; cursor: pointer; border-radius: 8px;
            font-size: 0.85rem; border-bottom: 1px solid #eee;
            transition: all 0.2s;
        }
        .playlist-item:hover { background: #fdfcf0; color: var(--v1); }
        .playlist-item.active { background: #ffebee; color: var(--v1); font-weight: bold; }

        /* Estilo Scroll Playlist */
        .playlist-menu::-webkit-scrollbar { width: 6px; }
        .playlist-menu::-webkit-scrollbar-thumb { background: var(--v1); border-radius: 10px; }

        .player-controls { display: flex; align-items: center; gap: 6px; }
        .player-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; }
        .player-btn svg { fill: #333; }
        .player-btn:hover svg { fill: #E91E63; }

        /* --- SOBRES --- */
        .envelope { 
            width: 150px; height: 105px; background: #f3d5b5; position: relative; 
            cursor: pointer; transition: transform 0.3s ease; perspective: 800px;
            overflow: visible;
        }
        .envelope:hover { transform: scale(1.1) rotate(2deg); }

        .envelope .carta-interior {
            position: absolute;
            bottom: 0; left: 10%; width: 80%;
            height: 55px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 2px 2px 0 0;
            z-index: 1;
            transform: translateY(0px);
            transition: transform 0.5s ease 0.2s, opacity 0.4s ease 0.2s;
            opacity: 0;
            background-image: repeating-linear-gradient(
                transparent, transparent 10px, #e8e8e8 10px, #e8e8e8 11px
            );
            background-position: 0 12px;
        }
        .envelope:hover .carta-interior {
            transform: translateY(-28px);
            opacity: 1;
        }

        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0; z-index: 3;
            border-top: 55px solid #e6ccb2;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            transform-origin: top;
            transition: transform 0.45s ease;
        }
        .envelope:hover::after { transform: rotateX(160deg); }
        
        .env-body { 
            position: absolute; inset: 0; z-index: 2; background: #f3d5b5; 
            display: flex; justify-content: center; align-items: center; 
        }
        .env-number { font-family: 'Bungee'; color: #7f5539; font-size: 1.5rem; }

        .modal-container { 
            display: flex; flex-wrap: nowrap; background: var(--crema); 
            width: 95vw; max-width: 1100px; height: 600px; 
            margin: 40px auto; border: 3px solid #333; overflow: hidden; 
        }
        .text-side { flex: 1; padding: 40px; border-right: 2px dashed #ccc; display: flex; flex-direction: column; }
        .scroll-area {
            flex-grow: 1; overflow-y: auto; padding: 20px 10px;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .flower-bg {
            position: fixed; font-size: 2rem; pointer-events: none; z-index: 0;
            animation: floatFlower 10s ease-in-out infinite alternate;
            opacity: 0.35;
        }
        @keyframes floatFlower {
            0%   { transform: translate(0, 0) rotate(-8deg) scale(1); }
            25%  { transform: translate(8px, -12px) rotate(4deg) scale(1.05); }
            50%  { transform: translate(-6px, -20px) rotate(-4deg) scale(0.97); }
            75%  { transform: translate(12px, -8px) rotate(8deg) scale(1.03); }
            100% { transform: translate(-10px, -25px) rotate(-6deg) scale(1); }
        }

        #main-content { display: none; padding: 130px 20px 80px; flex-direction: column; align-items: center; position: relative; }
        .envelopes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; max-width: 1200px; position: relative; z-index: 1; }
        .custom-btn { padding: 15px 35px; cursor: pointer; font-family: 'Bungee'; border: 3px solid #333; background: #fff; box-shadow: 5px 5px 0px #333; transition: 0.2s; }
        .custom-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #333; }
        .header-nav { position: fixed; top: 0; width: 100%; height: 90px; background: linear-gradient(var(--crema) 75%, transparent); display: flex; justify-content: center; align-items: center; z-index: 500; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 3000; padding: 20px; justify-content: center; align-items: center; }
        .photo-side { width: 450px; padding: 30px; background: #fff; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; overflow-y: auto; }
        #video-overlay { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }

        #flower-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

        /* LOADER */
        #loader {
            position: fixed; inset: 0; background: var(--crema);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease, visibility 1s;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-content { text-align: center; display: flex; flex-direction: column; gap: 20px; }
        .loader-heart { font-size: 3rem; animation: heartbeat 1.2s infinite; }
        .loader-text { font-family: 'Dancing Script'; font-size: 1.5rem; color: #b08968; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .envelope.pendiente .env-body { background: repeating-linear-gradient(45deg, #f3d5b5, #f3d5b5 5px, #edd5aa 5px, #edd5aa 10px); }
        .vhs-lines { 
            position: absolute; inset: 0; pointer-events: none; z-index: 5001; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04)); 
            background-size: 100% 4px, 3px 100%; opacity: 0.6; 
            animation: vhs-flicker 0.1s infinite;
        }
        @keyframes vhs-flicker { 0% { opacity: 0.5; } 50% { opacity: 0.6; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="grid-bg">

    <div id="loader">
        <div class="loader-content">
            <div class="loader-heart">💖</div>
            <p class="loader-text">Cargando algo especial...</p>
        </div>
    </div>

    <div class="music-player" id="player" style="display:none;">
        <div class="playlist-wrapper">
            <div class="vinyl-disk" id="vinyl" onclick="togglePlaylist()" title="Ver Lista" style="cursor:pointer;"></div>
            <div id="playlist-menu" class="playlist-menu"></div>
        </div>
        
        <div class="player-controls">
            <button class="player-btn" onclick="prevTrack()" title="Anterior">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="player-btn" onclick="togglePlay()">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="player-btn" onclick="nextTrack()" title="Siguiente">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.89L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
            </button>
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
            <span id="track-name" style="font-size:0.75rem; font-weight:bold; max-width:110px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">♪</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" style="width:70px;">
        </div>
        <audio id="bg-music"></audio>
    </div>

    <div id="landing" class="grid-bg">
        <div class="polaroid-landing" style="top:5%; left:4%; --r:-8deg; --sway-dur:4.5s;"><img src="img/isa1.png"></div>
        <div class="polaroid-landing" style="top:58%; right:10%; --r:10deg; --sway-dur:6s;"><img src="img/isa2.png"></div>
        <div class="polaroid-landing" style="bottom:8%; left:15%; --r:6deg; --sway-dur:5.2s;"><img src="img/isa3.png"></div>
        <div class="polaroid-landing" style="bottom:64%; right:4%; --r:5deg; --sway-dur:4.8s;"><img src="img/isa8.png"></div>

        <span class="floating-emoji" style="top:8%; right:32%;">✈️</span>
        <span class="floating-emoji" style="top:55%; left:38%;">🗼</span>
        <span class="floating-emoji" style="top:54%; right:32%;">🎬</span>
        <span class="floating-emoji" style="top:70%; left:8%;">🎨</span>
        <span class="floating-emoji" style="bottom:6%; right:28%;">🌻</span>
        <span class="floating-emoji" style="top:12%; left:45%;">🎓</span>
        <span class="floating-emoji" style="top:10%; left:30%;">📸</span>
        <span class="floating-emoji" style="bottom:12%; left:38%;">🤳</span>
        <span class="floating-emoji" style="bottom:22%; right:4%;">💖</span>

        <div class="title-container">
            <div class="line" id="line1"></div>
            <div class="line" id="line2"></div>
        </div>
        <button class="custom-btn" style="font-size:1.8rem;" onclick="start()">ABRIR</button>
    </div>

    <div class="header-nav" id="header-nav" style="display:none;">
        <button class="custom-btn" style="position:absolute; left:20px; padding:10px 20px; font-size:0.8rem;" onclick="location.reload()">← VOLVER</button>
        <h1 style="font-family:'Dancing Script'; color:#d62828; margin:0; font-size:2.4rem;">Happy Birthday, Isa</h1>
    </div>

    <div id="main-content" class="grid-bg">
        <div id="flower-container"></div>
        <div class="envelopes-grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal-container">
            <div class="text-side">
                <div id="friend-name-container" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
                <div class="scroll-area">
                    <p id="letter-text" style="font-size:1.3rem; line-height:1.7; color:#444;"></p>
                </div>
                <button class="custom-btn" style="width:100%; margin-top:20px;" onclick="closeModal()">CERRAR CARTA</button>
            </div>
            <div class="photo-side" id="photo-container"></div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="vhs-lines"></div> 
        <video id="video-final" style="width:90%; max-width:1000px; border:10px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
            <source src="video_cumple.mov" type="video/quicktime">
            Tu navegador no soporta videos.
        </video>
        <button class="custom-btn" style="margin-top:20px; position:relative; z-index:5002;" onclick="location.reload()">REPETIR EXPERIENCIA</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://hstxthniajjvatbqwpsx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzdHh0aG5pYWpqdmF0YnF3cHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzYyODEsImV4cCI6MjA5MTkxMjI4MX0.tF8hfuXDYpp8vSjlTDoEFXv8DfFQeIhlbxhrh5ufvpo';

        async function sbFetch(path, opts = {}) {
            try {
                const res = await fetch(SUPABASE_URL + path, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Content-Type': 'application/json',
                        ...opts.headers
                    },
                    ...opts
                });
                return res.json();
            } catch (err) { return []; }
        }

        function getPublicUrl(bucket, path) {
            return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
        }

        let cartasData = [];   
        let totalUsuarios = 0; 
        let cartasLeidas = new Set();
        const TOTAL_OBJETIVO = 28;

        async function cargarCartas() {
            try {
                const usuarios = await sbFetch('/rest/v1/usuarios?select=*&order=id.asc');
                const cartas = await sbFetch('/rest/v1/cartas?select=*');
                totalUsuarios = usuarios.length || 0;
                const cartaMap = {};
                cartas.forEach(c => { cartaMap[c.usuario_id] = c; });

                cartasData = usuarios.map(u => ({
                    id: u.id,
                    nombre: u.nombre,
                    mensaje: cartaMap[u.id] ? cartaMap[u.id].mensaje : "...",
                    foto1: (cartaMap[u.id] && cartaMap[u.id].foto1_path) ? getPublicUrl('fotos', cartaMap[u.id].foto1_path) : null,
                    foto2: (cartaMap[u.id] && cartaMap[u.id].foto2_path) ? getPublicUrl('fotos', cartaMap[u.id].foto2_path) : null,
                    enviada: !!cartaMap[u.id]
                }));
                construirGrid();
            } catch(e) { construirGrid(); }
        }

        function construirGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const cantidadAMostrar = Math.max(TOTAL_OBJETIVO, cartasData.length);
            for (let i = 0; i < cantidadAMostrar; i++) {
                const env = document.createElement('div');
                env.className = 'envelope' + (!cartasData[i] || !cartasData[i].enviada ? ' pendiente' : '');
                env.innerHTML = `<div class="carta-interior"></div><div class="env-body"><div class="env-number">${i + 1}</div></div>`;
                env.onclick = () => openLetter(i);
                grid.appendChild(env);
            }
        }

        async function openLetter(index) {
            const datos = cartasData[index];
            if (!datos || !datos.enviada) return;
            buildLetters(datos.nombre, 'friend-name-container');
            document.getElementById('letter-text').innerText = datos.mensaje;
            const pc = document.getElementById('photo-container');
            pc.innerHTML = '';
            if (datos.foto1) { const im = document.createElement('img'); im.src = datos.foto1; im.style.cssText = "width:100%; border:10px solid #fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); transform:rotate(-3deg); margin-bottom:15px;"; pc.appendChild(im); }
            if (datos.foto2) { const im = document.createElement('img'); im.src = datos.foto2; im.style.cssText = "width:100%; border:10px solid #fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); transform:rotate(3deg);"; pc.appendChild(im); }
            document.getElementById('overlay').style.display = 'flex';
            if (!cartasLeidas.has(datos.id)) {
                cartasLeidas.add(datos.id);
                document.querySelectorAll('.envelope')[index].style.filter = 'grayscale(1) opacity(0.5)';
            }
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            if (cartasLeidas.size >= totalUsuarios && totalUsuarios > 0) setTimeout(dispararVideoFinal, 500);
        }

        /* --- LOGICA REPRODUCTOR Y PLAYLIST --- */
        const playlist = [
            { src: "music/cancion1.mp3", titulo: "Aprender a Quererte" },
            { src: "music/cancion2.mp3", titulo: "Corazón" },
            { src: "music/cancion3.mp3", titulo: "Mi Nuevo Vicio" },
            { src: "music/cancion4.mp3", titulo: "Una Canción de Amor para Isa" },
            { src: "music/cancion5.mp3", titulo: "Turning Page" },
            { src: "music/cancion6.mp3", titulo: "Learn to Love Again" },
            { src: "music/cancion7.mp3", titulo: "Yellow" },
        ];

        const audio = document.getElementById('bg-music');
        const vinyl = document.getElementById('vinyl');
        const playlistMenu = document.getElementById('playlist-menu');
        let currentTrack = 0;

        function renderPlaylist() {
            playlistMenu.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (index === currentTrack ? ' active' : '');
                item.innerText = `${index + 1}. ${track.titulo}`;
                item.onclick = (e) => {
                    e.stopPropagation(); // Evita cerrar el menú al hacer clic
                    loadTrack(index);
                    audio.play();
                    ui(true);
                    togglePlaylist(); // Cierra el menú tras elegir
                };
                playlistMenu.appendChild(item);
            });
        }

        function togglePlaylist() {
            playlistMenu.classList.toggle('active');
            renderPlaylist();
        }

        // Cerrar playlist si se hace clic fuera
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.playlist-wrapper')) playlistMenu.classList.remove('active');
        });

        function loadTrack(index) {
            currentTrack = (index + playlist.length) % playlist.length;
            audio.src = playlist[currentTrack].src;
            document.getElementById('track-name').textContent = playlist[currentTrack].titulo;
            renderPlaylist();
        }

        function prevTrack() { loadTrack(currentTrack - 1); audio.play(); ui(true); }
        function nextTrack() { loadTrack(currentTrack + 1); audio.play(); ui(true); }
        audio.onended = () => nextTrack();

        function togglePlay() {
            if (audio.paused) { audio.play(); ui(true); }
            else { audio.pause(); ui(false); }
        }
        function ui(playing) {
            document.getElementById('play-icon').style.display = playing ? 'none' : 'block';
            document.getElementById('pause-icon').style.display = playing ? 'block' : 'none';
            vinyl.style.animationPlayState = playing ? 'running' : 'paused';
        }

        async function start() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('header-nav').style.display = 'flex';
            document.getElementById('player').style.display = 'flex';
            loadTrack(0);
            togglePlay();
            createFlowers();
            await cargarCartas();
        }

        function buildLetters(text, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            text.split(' ').forEach((word, wi, arr) => {
                const wordDiv = document.createElement('div');
                wordDiv.style.display = 'flex';
                word.split('').forEach(char => {
                    const s = document.createElement('span');
                    s.className = `char v${Math.floor(Math.random() * 5) + 1}`;
                    s.innerText = char;
                    s.style.setProperty('--r', `${Math.random() * 8 - 4}deg`);
                    wordDiv.appendChild(s);
                });
                container.appendChild(wordDiv);
                if (wi < arr.length - 1) {
                    const sp = document.createElement('div'); sp.style.width = '16px'; container.appendChild(sp);
                }
            });
        }
        buildLetters("de todos los que", 'line1');
        buildLetters("te queremos, Bel", 'line2');

        function createFlowers() {
            const container = document.getElementById('flower-container');
            const icons = ['🌻', '🌸', '✨', '💖', '🌼', '🌺'];
            for(let i=0; i<20; i++) {
                const f = document.createElement('div');
                f.className = 'flower-bg'; f.innerText = icons[i % icons.length];
                f.style.top = Math.random() * 90 + '%'; f.style.left = Math.random() * 90 + '%';
                f.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(f);
            }
        }

        function dispararVideoFinal() {
            if (audio) { audio.pause(); ui(false); }
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('video-final').play();
        }

        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;
        window.onload = () => setTimeout(() => document.getElementById('loader').classList.add('hidden'), 2000);
    </script>
</body>
</html>
