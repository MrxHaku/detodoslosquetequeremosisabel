<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 Primaveras - Bel</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema: #fdfcf0; --miel: #b08968;
            --v1: #E91E63; --v2: #FFEB3B; --v3: #2196F3; --v4: #4CAF50; --v5: #FF5722;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--crema); 
            font-family: 'Special Elite', serif; overflow-x: hidden;
        }

        /* --- RETÍCULA GLOBAL --- */
        .grid-bg {
            background-color: var(--crema);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- LANDING --- */
        #landing {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s; padding: 20px;
        }
        #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .char {
            display: inline-block; font-family: 'Bungee', cursive;
            font-size: clamp(1.2rem, 5.5vw, 3.8rem); 
            padding: clamp(4px, 1vw, 10px) clamp(6px, 1.5vw, 15px);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            transform: rotate(var(--r)); margin: 3px;
        }
        .v1 { background: var(--v1); color: white; }
        .v2 { background: var(--v2); color: #333; }
        .v3 { background: var(--v3); color: white; }
        .v4 { background: var(--v4); color: white; }
        .v5 { background: var(--v5); color: white; }

        .floating-emoji {
            position: absolute; font-size: clamp(2rem, 6vw, 4rem);
            animation: float-around var(--d) ease-in-out infinite alternate;
            z-index: 5;
        }
        @keyframes float-around { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(var(--x),var(--y)) rotate(var(--rot)); } }

        .polaroid-landing {
            position: absolute; background: white; padding: 8px 8px 25px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #ddd;
            width: clamp(100px, 12vw, 150px); transform: rotate(var(--r));
        }
        .polaroid-landing img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* --- BOTONES ESTILO DISEÑO --- */
        .custom-btn {
            padding: 12px 25px; cursor: pointer; font-family: 'Bungee'; border: 3px solid #333;
            background: #fff; box-shadow: 4px 4px 0px #333; transition: 0.2s;
        }
        .custom-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #333; }

        /* --- HEADER Y VOLVER --- */
        .header-nav { 
            position: fixed; top: 0; width: 100%; height: 100px; 
            background: linear-gradient(to bottom, var(--crema) 70%, transparent); 
            display: flex; justify-content: center; align-items: center; z-index: 500; 
        }
        .back-arrow { position: absolute; left: 20px; font-size: 0.7rem; }

        /* --- REPRODUCTOR COMPACTO --- */
        .music-player {
            position: fixed; bottom: 20px; left: 20px; display: flex; align-items: center;
            gap: 10px; background: rgba(255, 255, 255, 0.95); padding: 8px 15px;
            border-radius: 50px; border: 2px solid #333; box-shadow: 4px 4px 0px #333; z-index: 2000;
            max-width: 250px;
        }
        .vinyl-disk {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #000;
            background: 
                radial-gradient(circle at center, #fff 15%, transparent 16%),
                radial-gradient(circle at center, #222 17%, transparent 18%),
                repeating-radial-gradient(circle at center, #222, #222 1px, #fff 1px, #fff 2px),
                conic-gradient(#fff 0deg 90deg, #222 90deg 180deg, #fff 180deg 270deg, #222 270deg 360deg);
            animation: spin 3s linear infinite; animation-play-state: paused;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- SOBRES --- */
        #main-content { display: none; padding: 120px 20px 100px; flex-direction: column; align-items: center; min-height: 100vh; }
        .envelopes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1000px; }
        .envelope { 
            width: 120px; height: 85px; background: #f3d5b5; position: relative; cursor: pointer; 
            border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .envelope::after { content: ''; position: absolute; top: 0; left: 0; border-top: 42px solid #e6ccb2; border-left: 60px solid transparent; border-right: 60px solid transparent; }
        .env-number { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-family: 'Bungee'; color: #7f5539; z-index: 10; }

        /* --- MODAL CARTA --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 3000; overflow-y: auto; padding: 20px; }
        .modal-container { display: flex; flex-wrap: wrap; background: var(--crema); max-width: 1000px; margin: 40px auto; border-radius: 12px; border: 3px solid #333; overflow: hidden; }
        .text-side { flex: 1; padding: 40px; border-right: 2px dashed #ccc; min-width: 320px; }
        .photo-side { flex: 1; padding: 30px; background: #fff; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .polaroid { background: white; padding: 10px 10px 30px 10px; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transform: rotate(var(--r)); }
        .polaroid img { width: 180px; height: 180px; object-fit: cover; }

        #video-overlay { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; justify-content: center; align-items: center; }
    </style>
</head>
<body class="grid-bg">

    <div class="music-player" id="player" style="display:none;">
        <div class="vinyl-disk" id="vinyl"></div>
        <div style="display:flex; gap:5px;">
            <button onclick="prevTrack()" style="background:none; border:none; cursor:pointer;"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button onclick="togglePlay()" style="background:none; border:none; cursor:pointer;">
                <svg id="play-icon" width="20" height="20" fill="#333" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" width="20" height="20" fill="#333" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button onclick="nextTrack()" style="background:none; border:none; cursor:pointer;"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="song-info"><span id="track-name" style="font-size:0.6rem; font-weight:bold;">Cargando...</span></div>
        <audio id="bg-music"></audio>
    </div>

    <div id="landing" class="grid-bg">
        <div class="polaroid-landing" style="top:8%; left:8%; --r:-10deg;"><img src="img/isa1.png"></div>
        <div class="polaroid-landing" style="top:45%; right:5%; --r:12deg;"><img src="img/isa 2.png"></div>
        <div class="polaroid-landing" style="bottom:5%; left:12%; --r:8deg;"><img src="img/isa 3.png"></div>

        <span class="floating-emoji" style="top:15%; right:20%; --x:20px; --y:40px; --rot:15deg; --d:4s;">🎨</span>
        <span class="floating-emoji" style="top:40%; left:5%; --x:-15px; --y:30px; --rot:-10deg; --d:5s;">🎬</span>
        <span class="floating-emoji" style="bottom:20%; right:25%; --x:25px; --y:-20px; --rot:20deg; --d:6s;">🌻</span>
        <span class="floating-emoji" style="bottom:10%; right:10%; --x:-20px; --y:-30px; --rot:10deg; --d:5.5s;">🤳</span>

        <div class="title-container">
            <div class="line" id="line1"></div>
            <div class="line" id="line2"></div>
        </div>
        <button class="custom-btn" style="margin-top:40px; font-size:1.5rem;" onclick="start()">Abrir</button>
    </div>

    <div class="header-nav" id="header-nav" style="display:none;">
        <button class="custom-btn back-arrow" onclick="location.reload()">← VOLVER</button>
        <h1 style="font-family:'Dancing Script'; color:#d62828; margin:0; font-size:2rem;">Happy Birthday, Isa</h1>
    </div>

    <div id="main-content" class="grid-bg">
        <div class="envelopes-grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal-container">
            <div class="text-side">
                <div id="friend-name-container" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center;"></div>
                <p id="letter-text" style="margin-top:25px; line-height:1.6; font-size:1.1rem;"></p>
                <button class="custom-btn" style="margin-top:20px; width:100%;" onclick="closeModal()">CERRAR CARTA</button>
            </div>
            <div class="photo-side" id="photo-container"></div>
        </div>
    </div>

    <div id="video-overlay">
        <video id="video-final" style="width:90%; border:5px solid white;"><source src="video_cumple.mov" type="video/quicktime"></video>
        <button class="custom-btn" style="position:absolute; bottom:30px;" onclick="stopVideo()">CERRAR VIDEO</button>
    </div>

    <script>
        const cartasData = [
            { 
                nombre: "Mamá", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Papá", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Daniel", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Anita", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Cata", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            { 
                nombre: "Paulis", 
                texto: "¡Feliz cumpleaños, Bel!\n\nEres una persona increíble y este es un pequeño detalle de todos los que te queremos para celebrar tus 28 primaveras.", 
                fotos: ["img/bel1.jpg", "img/bel2.jpg"] 
            },
            //... Agregar más cartas hasta llegar a 28
        ];

        const playlist = [
            { src: "music/cancion1.mp3", titulo: "Aprender a Quererte" },
            { src: "music/cancion2.mp3", titulo: "Corazón" },
            { src: "music/cancion3.mp3", titulo: "Mi Nuevo Vicio" },
            { src: "music/cancion4.mp3", titulo: "Una Canción de Amor para Isa" },
            { src: "music/cancion5.mp3", titulo: "Turning Page"},
            { src: "music/cancion6.mp3", titulo: "Learn to Love Again"},
            { src: "music/cancion7.mp3", titulo: "Yellow"},
        ];

        let currentTrack = 0;
        const audio = document.getElementById('bg-music');
        const vinyl = document.getElementById('vinyl');

        function loadSong(idx) {
            audio.src = playlist[idx].src;
            document.getElementById('track-name').innerText = playlist[idx].titulo;
            audio.load();
        }
        loadSong(currentTrack);

        function togglePlay() {
            if (audio.paused) { audio.play(); ui(true); } else { audio.pause(); ui(false); }
        }

        function ui(playing) {
            document.getElementById('play-icon').style.display = playing ? 'none' : 'block';
            document.getElementById('pause-icon').style.display = playing ? 'block' : 'none';
            vinyl.style.animationPlayState = playing ? 'running' : 'paused';
        }

        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadSong(currentTrack); audio.play(); ui(true); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadSong(currentTrack); audio.play(); ui(true); }

        function start() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('header-nav').style.display = 'flex';
            document.getElementById('player').style.display = 'flex';
            audio.play(); ui(true);
        }

        function buildLetters(text, containerId, sizeClass = "") {
            const container = document.getElementById(containerId);
            text.split(' ').forEach(word => {
                const wordDiv = document.createElement('div'); wordDiv.style.display='flex';
                word.split('').forEach(char => {
                    const s = document.createElement('span');
                    s.className = `char v${Math.floor(Math.random()*5)+1} ${sizeClass}`;
                    s.innerText = char;
                    s.style.setProperty('--r', `${Math.random()*8-4}deg`);
                    wordDiv.appendChild(s);
                });
                container.appendChild(wordDiv);
                const space = document.createElement('div'); space.style.width='10px'; container.appendChild(space);
            });
        }

        buildLetters("de todos los que", 'line1');
        buildLetters("te queremos Bel", 'line2');

        const grid = document.getElementById('grid');
        let readSet = new Set();
        for(let i=0; i<28; i++) {
            const env = document.createElement('div'); env.className = 'envelope';
            env.innerHTML = `<div class="env-number">${(i+1).toString().padStart(2,'0')}</div>`;
            env.onclick = () => openLetter(i);
            grid.appendChild(env);
        }

        function openLetter(i) {
            const data = cartasData[i] || { nombre: "Amigo", texto: "Mensaje pendiente...", fotos: [] };
            const nameCont = document.getElementById('friend-name-container');
            nameCont.innerHTML = '';
            buildLetters(data.nombre, 'friend-name-container');
            
            document.getElementById('letter-text').innerText = data.texto;
            const photoCont = document.getElementById('photo-container');
            photoCont.innerHTML = '';
            data.fotos.forEach(url => {
                const pol = document.createElement('div'); pol.className = 'polaroid';
                pol.style.setProperty('--r', `${Math.random()*10-5}deg`);
                pol.innerHTML = `<img src="${url}">`; photoCont.appendChild(pol);
            });
            document.getElementById('overlay').style.display = 'block';
            readSet.add(i);
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            if(readSet.size === 28) {
                audio.pause(); document.getElementById('video-overlay').style.display = 'flex';
                document.getElementById('video-final').play();
            }
        }

        function stopVideo() { document.getElementById('video-final').pause(); document.getElementById('video-overlay').style.display = 'none'; audio.play(); ui(true); }
    </script>
</body>
</html>
