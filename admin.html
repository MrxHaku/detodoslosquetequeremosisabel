<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – 28 Primaveras</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root { --crema: #fdfcf0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Special Elite', serif;
            background: var(--crema);
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh; padding: 40px 20px;
        }
        h1 { font-family: 'Dancing Script'; color: #d62828; font-size: 2.5rem; margin-bottom: 8px; text-align: center; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 0.95rem; }

        .card {
            background: #fff; border: 3px solid #333; box-shadow: 6px 6px 0 #333;
            padding: 30px; max-width: 900px; margin: 0 auto 40px;
        }
        .card h2 { font-family: 'Bungee'; font-size: 1.1rem; margin-bottom: 20px; color: #333; border-bottom: 2px dashed #ccc; padding-bottom: 10px; }

        /* Formulario agregar usuario */
        .add-form { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .add-form .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
        .add-form label { font-size: 0.75rem; color: #888; }
        .add-form input {
            padding: 10px 14px; font-family: 'Special Elite', serif;
            border: 2px solid #ccc; background: var(--crema); font-size: 0.95rem; outline: none;
        }
        .add-form input:focus { border-color: #333; }

        .btn { padding: 10px 24px; cursor: pointer; font-family: 'Bungee'; font-size: 0.9rem; border: 2px solid #333; background: #fff; box-shadow: 3px 3px 0 #333; transition: 0.15s; }
        .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #333; }
        .btn.green { background: #4CAF50; color: #fff; border-color: #388e3c; box-shadow: 3px 3px 0 #388e3c; }
        .btn.green:hover { box-shadow: 4px 4px 0 #388e3c; }
        .btn.red { background: #E91E63; color: #fff; border-color: #c01454; box-shadow: 3px 3px 0 #c01454; }
        .btn.small { padding: 5px 12px; font-size: 0.75rem; }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #333; color: #fff; padding: 10px 14px; text-align: left; font-family: 'Bungee'; font-size: 0.8rem; }
        td { padding: 10px 14px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fdfcf0; }
        .badge { display: inline-block; padding: 3px 10px; font-size: 0.75rem; font-family: 'Bungee'; }
        .badge.ok { background: #e8f5e9; color: #388e3c; border: 1px solid #a5d6a7; }
        .badge.pending { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }

        .link-cell { font-size: 0.8rem; color: #2196F3; word-break: break-all; }

        .msg { padding: 10px 16px; margin: 10px 0; font-size: 0.9rem; }
        .msg.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4CAF50; }
        .msg.err { background: #ffebee; color: #c62828; border-left: 4px solid #E91E63; }

        .spinner { display: none; width: 22px; height: 22px; border: 2px solid #ccc; border-top-color: #333; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    </style>
</head>
<body>
    <h1>Panel de administración</h1>
    <p class="subtitle">28 Primaveras – Gestión de usuarios y cartas</p>

    <!-- ── LOGIN ADMIN ── -->
    <div class="card" id="admin-login">
        <h2>ACCESO ADMIN</h2>
        <p style="margin-bottom:16px; color:#666; font-size:0.9rem;">Este panel es solo para ti. Ingresa tu clave de administrador.</p>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <input type="password" id="admin-pass" placeholder="Clave admin" style="padding:10px 14px; border:2px solid #ccc; background:var(--crema); font-family:'Special Elite',serif; flex:1; min-width:200px;">
            <button class="btn green" onclick="loginAdmin()">ENTRAR</button>
        </div>
        <div id="admin-login-err" class="msg err" style="display:none;"></div>
    </div>

    <!-- ── PANEL PRINCIPAL ── -->
    <div id="panel" style="display:none;">

        <!-- Agregar usuario -->
        <div class="card">
            <h2>AGREGAR NUEVO USUARIO</h2>
            <div class="add-form">
                <div class="field">
                    <label>NOMBRE (como aparece en la carta)</label>
                    <input type="text" id="new-nombre" placeholder="Ej: Valentina">
                </div>
                <div class="field">
                    <label>USUARIO (para iniciar sesión)</label>
                    <input type="text" id="new-usuario" placeholder="Ej: vale">
                </div>
                <div class="field">
                    <label>CONTRASEÑA</label>
                    <input type="text" id="new-pass" placeholder="Ej: Vale@ISA28">
                </div>
                <button class="btn green" onclick="agregarUsuario()">+ AGREGAR</button>
                <div class="spinner" id="add-spinner"></div>
            </div>
            <div id="add-msg" class="msg" style="display:none;"></div>
        </div>

        <!-- Lista de usuarios -->
        <div class="card">
            <div class="top-row">
                <h2 style="margin:0; border:none; padding:0;">LISTA DE USUARIOS</h2>
                <button class="btn" onclick="cargarUsuarios()">↻ ACTUALIZAR</button>
            </div>
            <div id="table-msg" class="msg" style="display:none;"></div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Usuario</th>
                            <th>Contraseña</th>
                            <th>Estado carta</th>
                            <th>Link para enviar</th>
                            <th>Eliminar</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr><td colspan="7" style="text-align:center; color:#aaa; padding:30px;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
       // ── SUPABASE CONFIG ──────────────────────────────────────────
        const SUPABASE_URL = 'https://hstxthniajjvatbqwpsx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzdHh0aG5pYWpqdmF0YnF3cHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzYyODEsImV4cCI6MjA5MTkxMjI4MX0.tF8hfuXDYpp8vSjlTDoEFXv8DfFQeIhlbxhrh5ufvpo';

        // Clave de administrador
        const ADMIN_PASS = 'admin@ISA28';

        // CORRECCIÓN AQUÍ: Esta lógica obtiene la carpeta actual sin importar el nombre del archivo
        const getBaseUrl = () => {
            const path = window.location.pathname;
            const directory = path.substring(0, path.lastIndexOf('/'));
            return window.location.origin + directory;
        };
        const BASE_URL = getBaseUrl();

        async function sbFetch(path, opts = {}) {
            const res = await fetch(SUPABASE_URL + path, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY,
                    'Content-Type': 'application/json',
                    ...opts.headers
                },
                ...opts
            });
            if (!res.ok) throw new Error(await res.text());
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }

        // ── LOGIN ADMIN ───────────────────────────────────────────────
        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            const errEl = document.getElementById('admin-login-err');
            if (pass !== ADMIN_PASS) {
                errEl.textContent = 'Clave incorrecta.';
                errEl.style.display = 'block';
                return;
            }
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            cargarUsuarios();
        }
        document.getElementById('admin-pass').addEventListener('keydown', e => {
            if (e.key === 'Enter') loginAdmin();
        });

        // ── CARGAR USUARIOS ───────────────────────────────────────────
        async function cargarUsuarios() {
            const tbody = document.getElementById('tabla-body');
            const msg = document.getElementById('table-msg');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px;">Cargando...</td></tr>';
            msg.style.display = 'none';

            try {
                const usuarios = await sbFetch('/rest/v1/usuarios?select=*&order=id.asc');
                const cartas = await sbFetch('/rest/v1/cartas?select=usuario_id');
                const conCarta = new Set((cartas || []).map(c => c.usuario_id));

                if (!usuarios || usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px;">No hay usuarios aún. ¡Agrega el primero!</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                usuarios.forEach((u, i) => {
                    const enviada = conCarta.has(u.id);
                    const link = `${BASE_URL}/upload.html?u=${encodeURIComponent(u.usuario)}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${i + 1}</td>
                        <td><strong>${u.nombre}</strong></td>
                        <td>${u.usuario}</td>
                        <td><code style="background:#f5f5f5;padding:2px 6px;">${u.password}</code></td>
                        <td><span class="badge ${enviada ? 'ok' : 'pending'}">${enviada ? '✓ Enviada' : '⏳ Pendiente'}</span></td>
                        <td class="link-cell">
                            <a href="${link}" target="_blank" style="color:#2196F3;">${link}</a>
                            <button class="btn small" style="margin-left:6px;" onclick="copiar('${link}')">Copiar</button>
                        </td>
                        <td>
                            ${!enviada ? `<button class="btn small red" onclick="eliminarUsuario(${u.id}, '${u.nombre}')">Eliminar</button>` : '<span style="color:#ccc; font-size:0.8rem;">—</span>'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch(e) {
                msg.textContent = 'Error cargando usuarios: ' + e.message;
                msg.className = 'msg err';
                msg.style.display = 'block';
            }
        }

        // ── AGREGAR USUARIO ───────────────────────────────────────────
        async function agregarUsuario() {
            const nombre = document.getElementById('new-nombre').value.trim();
            const usuario = document.getElementById('new-usuario').value.trim();
            const pass = document.getElementById('new-pass').value.trim();
            const msgEl = document.getElementById('add-msg');
            const spinner = document.getElementById('add-spinner');

            msgEl.style.display = 'none';
            if (!nombre || !usuario || !pass) {
                msgEl.textContent = 'Por favor completa todos los campos.';
                msgEl.className = 'msg err'; msgEl.style.display = 'block'; return;
            }

            spinner.style.display = 'block';
            try {
                await sbFetch('/rest/v1/usuarios', {
                    method: 'POST',
                    headers: { 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ nombre, usuario, password: pass })
                });
                document.getElementById('new-nombre').value = '';
                document.getElementById('new-usuario').value = '';
                document.getElementById('new-pass').value = '';
                msgEl.textContent = `✓ Usuario "${nombre}" agregado correctamente.`;
                msgEl.className = 'msg ok'; msgEl.style.display = 'block';
                spinner.style.display = 'none';
                await cargarUsuarios();
            } catch(e) {
                spinner.style.display = 'none';
                msgEl.textContent = 'Error al agregar: ' + e.message;
                msgEl.className = 'msg err'; msgEl.style.display = 'block';
            }
        }

        // ── ELIMINAR USUARIO ──────────────────────────────────────────
        async function eliminarUsuario(id, nombre) {
            if (!confirm(`¿Eliminar a "${nombre}"? Esta acción no se puede deshacer.`)) return;
            try {
                await sbFetch(`/rest/v1/usuarios?id=eq.${id}`, { method: 'DELETE' });
                await cargarUsuarios();
            } catch(e) {
                alert('Error al eliminar: ' + e.message);
            }
        }

        // ── COPIAR LINK ───────────────────────────────────────────────
        function copiar(texto) {
            navigator.clipboard.writeText(texto).then(() => alert('¡Link copiado!'));
        }
    </script>
</body>
</html>
